<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive To-Do List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header class="header">
            <h1>My To-Do List</h1>
            <p class="subtitle">Stay organized and focused</p>
        </header>

        <div class="stats">
            <div class="stat-item">
                <span class="stat-label">Total:</span>
                <span class="stat-value" id="totalCount">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Active:</span>
                <span class="stat-value" id="activeCount">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Completed:</span>
                <span class="stat-value" id="completedCount">0</span>
            </div>
        </div>

        <div class="input-section">
            <input type="text" id="taskInput" class="task-input" placeholder="Add a new task..." autocomplete="off">
            <button id="addTaskBtn" class="btn btn-primary">Add Task</button>
        </div>

        <div class="filter-section">
            <button class="filter-btn filter-btn-active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <ul class="task-list" id="taskList">
        </ul>

        <div class="empty-state" id="emptyState">
            <p>No tasks yet. Add one to get started!</p>
        </div>

        <div class="actions">
            <button id="clearCompletedBtn" class="btn btn-secondary">Clear Completed</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
